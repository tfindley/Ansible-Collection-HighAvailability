---
- name: "HAProxy.Install - Install HAProxy"
  become: true
  ansible.builtin.package:
    name: "{{ haproxy_package_name }}"
  notify:
    - "HAProxy Enabled"
    - "HAProxy Start"

- name: "HAProxy.Install - Ensure conf.d directory exists"
  become: true
  ansible.builtin.file:
    path: "{{ haproxy_config_confd }}"
    owner: "{{ haproxy_service_user }}"
    group: "{{ haproxy_service_group }}"
    mode: '0750'

- name: "HAProxy.Install - Create new service.d file"
  become: true
  notify:
    - 'Daemon reload'
  ansible.builtin.template:
    src: etc/systemd/system/haproxy.service.j2
    dest: /etc/systemd/system/haproxy.service
    owner: root
    group: root
    mode: '0644'

- name: "HAProxy.Install - Set nonlocal bind"
  become: true
  when:
    - haproxy_nonlocal_bind
  ansible.posix.sysctl:
    name: net.ipv4.ip_nonlocal_bind
    value: '1'
    sysctl_set: true
